name: Integration testing (multiple dbt versions)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  # Daily run against main so we catch upstream drift (action versions,
  # dbt-adapter releases, dependency resolution flips) before the next PR does.
  # 05:17 UTC is off-peak for shared GitHub runners.
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:

env:
  DBT_PROJECT_DIR: integration_tests
  DBT_PROFILES_DIR: integration_tests
  BIGQUERY_PROJECT: dbt-date
  BIGQUERY_KEYFILE_JSON: ${{ secrets.BIGQUERY_KEYFILE_JSON }}
  BIGQUERY_SCHEMA: "integration_tests_bigquery_${{ github.run_number }}"
  CLICKHOUSE_HOST: localhost
  CLICKHOUSE_PORT: "8123"
  CLICKHOUSE_SCHEMA: dbt_date
  CLICKHOUSE_USER: default
  DBT_ENV_SECRET_DATABRICKS_TOKEN: "${{ secrets.DBT_ENV_SECRET_DATABRICKS_TOKEN }}"
  DATABRICKS_HTTP_PATH: "${{ vars.DATABRICKS_HTTP_PATH }}"
  DATABRICKS_HOST: "${{ vars.DATABRICKS_HOST }}"
  DATABRICKS_SCHEMA: "dbt_date_${{ github.run_number }}"
  DBT_ENV_SECRET_POSTGRES_PASS: dbt
  POSTGRES_DATABASE: metastore
  POSTGRES_HOST: localhost
  POSTGRES_PORT: 5432
  POSTGRES_SCHEMA: dbt_date
  POSTGRES_USER: dbt
  SPARK_HOST: localhost
  SPARK_METHOD: thrift
  SPARK_PORT: 10000
  SPARK_SCHEMA: dbt_date
  SPARK_USER: dbt
  DBT_ENV_SECRET_TRINO_PASS: dbt
  TRINO_CATALOG: dbt
  TRINO_HOST: localhost
  TRINO_METHOD: none
  TRINO_PORT: "8080"
  TRINO_SCHEMA: dbt
  TRINO_TIMEZONE: UTC
  TRINO_USER: dbt
jobs:
  integration_tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        adapter:
          - bigquery
          - clickhouse
          - databricks
          - duckdb
          - postgres
          - spark
          - trino
        dbt-version:
          - "1.10"
        # Only BigQuery, Databricks, and dbt-core have a 1.11 stable on PyPI
        # as of this PR. Add other adapters to this include list as they ship.
        include:
          - adapter: bigquery
            dbt-version: "1.11"
          - adapter: databricks
            dbt-version: "1.11"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install dbt-${{ matrix.adapter }}~=${{ matrix.dbt-version }} (including Spark extra)
        if: ${{ matrix.adapter == 'spark' }}
        run: pip install "dbt-${{ matrix.adapter }}[PyHive]~=${{ matrix.dbt-version }}.0" "dbt-core~=${{ matrix.dbt-version }}.0" tox

      - name: Install dbt-${{ matrix.adapter }}~=${{ matrix.dbt-version }}
        if: ${{ matrix.adapter != 'spark' && !(matrix.adapter == 'bigquery' && matrix.dbt-version == '1.6') }}
        run: pip install "dbt-${{ matrix.adapter }}~=${{ matrix.dbt-version }}.0" "dbt-core~=${{ matrix.dbt-version }}.0" tox

      - name: Install testing dependencies (non-python)
        if: ${{ matrix.adapter == 'clickhouse' || matrix.adapter == 'postgres' || matrix.adapter == 'spark' || matrix.adapter == 'trino' }}
        env:
          ADAPTER: ${{ matrix.adapter }}
          COMPOSE_FILE: ./integration_tests/docker-compose.yml
        run: |
          docker compose -f "$COMPOSE_FILE" up -d "dbt-$ADAPTER"
          # Each adapter answers a real readiness probe rather than waiting a
          # fixed amount of time — fails fast when a service is broken,
          # returns sooner when it's healthy, and tells us which service
          # didn't come up.
          case "$ADAPTER" in
            clickhouse)
              probe() { curl -sf http://localhost:8123/ping >/dev/null; }
              ;;
            postgres)
              probe() { docker compose -f "$COMPOSE_FILE" exec -T dbt-postgres pg_isready -U dbt -d metastore; }
              ;;
            trino)
              # /v1/info returns 200 while the coordinator is still in
              # "starting":true — only proceed once starting flips to false,
              # otherwise dbt connects and gets SERVER_STARTING_UP.
              probe() { curl -sf http://localhost:8080/v1/info | grep -q '"starting":false'; }
              ;;
            spark)
              # The thrift port binds before HiveServer2 can actually accept
              # queries, so a TCP probe returns ready too early. Wait for the
              # readiness log line instead.
              probe() { docker compose -f "$COMPOSE_FILE" logs dbt-spark 2>&1 | grep -q "HiveThriftServer2 started"; }
              ;;
          esac
          deadline=$(( $(date +%s) + 90 ))
          until probe; do
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "::error::dbt-$ADAPTER did not become ready within 90s"
              docker compose -f "$COMPOSE_FILE" logs "dbt-$ADAPTER"
              exit 1
            fi
            sleep 2
          done
          echo "dbt-$ADAPTER is ready"

      - name: Run integration tests (${{ matrix.adapter }})
        run: |
          export DBT_SUFFIX=_$(date +%6N)
          tox -e dbt_integration_${{ matrix.adapter }}

  integration_tests_fusion:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        adapter:
          - bigquery
          - databricks

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      # Having a DuckDB adapter in profiles.yml is unsupported by Fusion (even if unused)
      - name: Update profiles.yml
        run: |
          yq -i eval 'del .integration_tests.outputs.duckdb' ./integration_tests/profiles.yml
          yq -i eval '.integration_tests.target = "bigquery"' ./integration_tests/profiles.yml

      # Fusion for BigQuery requires a different auth method
      - name: Save BigQuery key file as a file
        if: ${{ matrix.adapter == 'bigquery' }}
        run: |
          echo -n "${{ secrets.BIGQUERY_KEYFILE_JSON_BASE64 }}" | base64 --decode >> ./integration_tests/service-key-file.json

      - name: Install tox
        run: pip install tox

      - name: Install dbt Fusion
        run: |
          curl -fsSL https://public.cdn.getdbt.com/fs/install/install.sh | sh -s -- --update
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Verify dbt installation
        run: dbt --version

      - name: Run fusion integration tests (${{ matrix.adapter }})
        env:
          BIGQUERY_KEYFILE_JSON: ${{ secrets.BIGQUERY_KEYFILE_JSON }}
          BIGQUERY_PROJECT: ${{ env.BIGQUERY_PROJECT }}
          BIGQUERY_SCHEMA: ${{ env.BIGQUERY_SCHEMA }}
          DBT_ENV_SECRET_DATABRICKS_TOKEN: ${{ secrets.DBT_ENV_SECRET_DATABRICKS_TOKEN }}
          DATABRICKS_HTTP_PATH: ${{ vars.DATABRICKS_HTTP_PATH }}
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
          DATABRICKS_SCHEMA: ${{ env.DATABRICKS_SCHEMA }}
        run: |
          export DBT_SUFFIX=_$(date +%6N)
          tox -e fusion_integration_${{ matrix.adapter }}
